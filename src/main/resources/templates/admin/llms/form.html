<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout(${pageTitle}, ~{::content})}">
<body>
<section th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/admin/llms}">LLM</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${editMode ? form.llmId : 'Nouveau'}">Nouveau</li>
        </ol>
    </nav>

    <article class="marcel-card card mb-3">
        <div class="card-body p-4">
            <span class="marcel-brand-badge mb-3">Administration LLM</span>
            <h1 class="h3 mb-2" th:text="${formTitle}">Nouveau LLM</h1>
            <p class="mb-0 marcel-text-soft">Configuration admin persistante. Un redemarrage peut etre necessaire pour recharger le registry runtime.</p>
        </div>
    </article>

    <article class="marcel-card card">
        <div class="card-body p-3 p-lg-4">
            <form method="post"
                  th:action="${editMode} ? @{/admin/llms/{llmId}(llmId=${form.llmId})} : @{/admin/llms}"
                  th:object="${form}"
                  class="row g-3">

                <div class="col-12 alert alert-danger marcel-alert mb-0" th:if="${#fields.hasGlobalErrors()}">
                    <div th:each="error : ${#fields.globalErrors()}" th:text="${error}">Validation error</div>
                </div>

                <input type="hidden" th:if="${editMode}" th:field="*{llmId}">

                <div class="col-12 col-md-5">
                    <label for="llmId" class="form-label">LLM id</label>
                    <input id="llmId" type="text" class="form-control" th:field="*{llmId}" th:readonly="${editMode}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('llmId')}" th:errors="*{llmId}"></div>
                </div>

                <div class="col-12 col-md-7">
                    <label for="baseUrl" class="form-label">Base URL</label>
                    <input id="baseUrl" type="text" class="form-control" th:field="*{baseUrl}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('baseUrl')}" th:errors="*{baseUrl}"></div>
                </div>

                <div class="col-12 col-md-7">
                    <label for="defaultModel" class="form-label">Default model</label>
                    <input id="defaultModel" type="text" class="form-control" th:field="*{defaultModel}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('defaultModel')}" th:errors="*{defaultModel}"></div>
                </div>

                <div class="col-12 col-md-5">
                    <label for="apiKey" class="form-label" th:text="${editMode} ? 'API key (leave blank to keep current)' : 'API key (optional)'"></label>
                    <input id="apiKey" type="password" autocomplete="new-password" class="form-control" th:field="*{apiKey}">
                    <div class="small marcel-text-soft mt-1" th:if="${editMode and apiKeyConfigured}">Une cle est deja configuree.</div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('apiKey')}" th:errors="*{apiKey}"></div>
                </div>

                <div class="col-12 d-flex gap-2 pt-2">
                    <button type="submit" class="btn btn-marcel-primary" th:text="${editMode} ? 'Enregistrer' : 'Creer'"></button>
                    <a class="btn btn-outline-secondary" th:href="${cancelHref}">Annuler</a>
                </div>
            </form>
        </div>
    </article>
</section>
</body>
</html>
