<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('Marcel | Technical Artifacts', ~{::content})}">
<body>
<section th:fragment="content">
    <div class="marcel-card card mb-3 mb-lg-4">
        <div class="card-body p-4">
            <span class="marcel-brand-badge mb-3">Technique</span>
            <h1 class="h3 mb-2">Artifacts recents</h1>
            <p class="mb-0 marcel-text-soft">Artefacts produits par les agents pour analyse et exploitation.</p>
        </div>
    </div>

    <th:block th:replace="~{fragments/technical-nav :: tabs(${activeTechnicalNav})}"></th:block>

    <article class="marcel-card card mb-3">
        <div class="card-body p-3 p-lg-4">
            <form method="get" action="/admin/technical/artifacts" th:action="@{/admin/technical/artifacts}" class="row g-3 align-items-end">
                <div class="col-12 col-md-3">
                    <label for="limit" class="form-label">Limit</label>
                    <input id="limit" name="limit" type="number" min="1" class="form-control" th:value="${effectiveLimit}">
                </div>
                <div class="col-12 col-md-3">
                    <label for="agentId" class="form-label">Agent</label>
                    <select id="agentId" name="agentId" class="form-select">
                        <option value="">Tous les agents</option>
                        <option th:each="agent : ${agentOptions}"
                                th:value="${agent.agentId}"
                                th:text="${agent.agentId}"
                                th:selected="${selectedAgentId == agent.agentId}">agent-1</option>
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <label for="taskId" class="form-label">Task ID</label>
                    <input id="taskId" name="taskId" type="text" class="form-control" th:value="${selectedTaskId}">
                </div>
                <div class="col-12 col-md-2 d-grid">
                    <button class="btn btn-marcel-primary" type="submit">Filtrer</button>
                </div>
            </form>
        </div>
    </article>

    <article class="marcel-card card">
        <div class="card-body p-3 p-lg-4">
            <div class="table-responsive">
                <table class="table table-hover table-marcel align-middle mb-0">
                    <thead>
                    <tr>
                        <th scope="col">Artifact</th>
                        <th scope="col">Type</th>
                        <th scope="col">Agent</th>
                        <th scope="col">Task</th>
                        <th scope="col">Stockage</th>
                        <th scope="col">Date</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(artifacts)}">
                        <td colspan="6" class="text-center py-4 marcel-text-soft">Aucun artifact recent pour ces filtres.</td>
                    </tr>
                    <tr th:each="artifact : ${artifacts}">
                        <td>
                            <div class="fw-semibold" th:text="${artifact.artifactId}">artifact-1</div>
                            <div class="small marcel-text-soft" th:text="${artifact.title}">Title</div>
                        </td>
                        <td>
                            <span class="badge text-bg-light" th:text="${artifact.type}">TYPE</span>
                        </td>
                        <td th:text="${artifact.producerAgentId}">agent-1</td>
                        <td th:text="${artifact.taskId}">task-1</td>
                        <td>
                            <div th:text="${artifact.storageKind}">fs</div>
                            <div class="small marcel-text-soft" th:text="${artifact.mediaType}">text/plain</div>
                            <div class="small marcel-text-soft" th:text="${artifact.sizeBytes} + ' B'">0 B</div>
                        </td>
                        <td>
                            <div th:text="${artifact.createdAt}">2026-01-01T00:00:00Z</div>
                            <div class="small marcel-text-soft" th:text="${artifact.expiresAt}">2026-01-02T00:00:00Z</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </article>
</section>
</body>
</html>
