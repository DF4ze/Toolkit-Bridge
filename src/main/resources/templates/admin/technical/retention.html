<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('Marcel | Technical Retention', ~{::content})}">
<body>
<section th:fragment="content">
    <div class="marcel-card card mb-3 mb-lg-4">
        <div class="card-body p-4">
            <span class="marcel-brand-badge mb-3">Technique</span>
            <h1 class="h3 mb-2">Retention</h1>
            <p class="mb-0 marcel-text-soft">Policies de retention appliquees aux familles d objets persistables.</p>
        </div>
    </div>

    <th:block th:replace="~{fragments/technical-nav :: tabs(${activeTechnicalNav})}"></th:block>

    <article class="marcel-card card">
        <div class="card-body p-3 p-lg-4">
            <div class="table-responsive">
                <table class="table table-hover table-marcel align-middle mb-0">
                    <thead>
                    <tr>
                        <th scope="col">Famille</th>
                        <th scope="col">TTL</th>
                        <th scope="col">Disposition</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(retentionItems)}">
                        <td colspan="3" class="text-center py-4 marcel-text-soft">Aucune policy de retention exposee.</td>
                    </tr>
                    <tr th:each="item : ${retentionItems}">
                        <td th:text="${item.family}">FAMILY</td>
                        <td th:text="${item.ttl}">PT24H</td>
                        <td>
                            <span class="badge text-bg-light" th:text="${item.disposition}">DELETE</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </article>
</section>
</body>
</html>
