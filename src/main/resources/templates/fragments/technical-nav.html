<th:block xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="tabs(activeTechnicalNav)">
        <div class="marcel-card card mb-3 mb-lg-4">
            <div class="card-body p-3 p-lg-4">
                <div class="d-flex flex-wrap gap-2">
                    <a class="btn btn-sm"
                       th:classappend="${activeTechnicalNav == 'overview'} ? 'btn-marcel-primary' : 'btn-outline-secondary'"
                       href="/admin/technical"
                       th:href="@{/admin/technical}">Overview</a>
                    <a class="btn btn-sm"
                       th:classappend="${activeTechnicalNav == 'agents'} ? 'btn-marcel-primary' : 'btn-outline-secondary'"
                       href="/admin/technical/agents"
                       th:href="@{/admin/technical/agents}">Agents</a>
                    <a class="btn btn-sm"
                       th:classappend="${activeTechnicalNav == 'tasks'} ? 'btn-marcel-primary' : 'btn-outline-secondary'"
                       href="/admin/technical/tasks"
                       th:href="@{/admin/technical/tasks}">Tasks</a>
                    <a class="btn btn-sm"
                       th:classappend="${activeTechnicalNav == 'traces'} ? 'btn-marcel-primary' : 'btn-outline-secondary'"
                       href="/admin/technical/traces"
                       th:href="@{/admin/technical/traces}">Traces</a>
                    <a class="btn btn-sm"
                       th:classappend="${activeTechnicalNav == 'artifacts'} ? 'btn-marcel-primary' : 'btn-outline-secondary'"
                       href="/admin/technical/artifacts"
                       th:href="@{/admin/technical/artifacts}">Artifacts</a>
                    <a class="btn btn-sm"
                       th:classappend="${activeTechnicalNav == 'configuration'} ? 'btn-marcel-primary' : 'btn-outline-secondary'"
                       href="/admin/technical/configuration"
                       th:href="@{/admin/technical/configuration}">Configuration</a>
                    <a class="btn btn-sm"
                       th:classappend="${activeTechnicalNav == 'retention'} ? 'btn-marcel-primary' : 'btn-outline-secondary'"
                       href="/admin/technical/retention"
                       th:href="@{/admin/technical/retention}">Retention</a>
                </div>
            </div>
        </div>
    </th:block>
</th:block>
